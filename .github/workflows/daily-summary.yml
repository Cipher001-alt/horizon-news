name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 18 * * *'  # 每天 UTC 18:00 = 北京时间凌晨 02:00
  workflow_dispatch:      # 允许手动触发

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要提交权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run Horizon
        env:
          # 将密钥映射到环境变量，供 config.json 使用
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
        run: uv run horizon --hours 24

      - name: Prepare docs for Jekyll
        run: |
          # 确保 docs/_posts 目录存在
          mkdir -p docs/_posts
          
          # 将生成的 Markdown 文件复制到 docs/_posts
          if [ -d "data/summaries" ]; then
            for file in data/summaries/*.md; do
              if [ -f "$file" ]; then
                cp "$file" "docs/_posts/$(basename "$file")"
              fi
            done
          fi

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # 保留 gh-pages 分支上的历史日报
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
